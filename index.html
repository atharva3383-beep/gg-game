<!DOCTYPE html>
<html>
<head>
  <title>GG Game</title>
</head>
<body>

<h2>Guessing Game</h2>

<div id="home">
  <input id="name" placeholder="Enter your name">
  <br><br>
  <button onclick="createRoom()">Create Room</button>
  <br><br>
  <input id="roomInput" placeholder="Room Code">
  <button onclick="joinRoom()">Join Room</button>
</div>

<div id="game" style="display:none;">
  <h3 id="roomCode"></h3>
  <h3 id="role"></h3>

  <div id="secretDiv">
    <input id="secret" placeholder="Enter secret">
    <button onclick="submitSecret()">Submit Secret</button>
  </div>

  <div id="guessDiv" style="display:none;">
    <input id="guess" placeholder="Enter guess">
    <button onclick="submitGuess()">Guess</button>
  </div>

  <h3 id="status"></h3>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  databaseURL: "YOUR_DB_URL",
  projectId: "YOUR_PROJECT_ID",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let roomCode = "";
let player = "";
let name = "";
let secret = "";

function createRoom(){
  name = document.getElementById("name").value;
  roomCode = Math.floor(1000 + Math.random()*9000).toString();
  player = "p1";

  db.ref("rooms/"+roomCode).set({
    p1: name,
    p2: "",
    turn: "p1",
    secret: "",
    status: "waiting"
  });

  startGame();
}

function joinRoom(){
  name = document.getElementById("name").value;
  roomCode = document.getElementById("roomInput").value;
  player = "p2";

  db.ref("rooms/"+roomCode).update({
    p2: name,
    status: "playing"
  });

  startGame();
}

function startGame(){
  document.getElementById("home").style.display = "none";
  document.getElementById("game").style.display = "block";
  document.getElementById("roomCode").innerText = "Room: "+roomCode;
  document.getElementById("role").innerText = "You are "+player;

  db.ref("rooms/"+roomCode).on("value", snap=>{
    const data = snap.val();
    if(!data) return;

    document.getElementById("status").innerText = "Turn: "+data.turn;

    if(player === data.turn){
      document.getElementById("guessDiv").style.display = "block";
    } else {
      document.getElementById("guessDiv").style.display = "none";
    }

    if(player === "p1" && data.secret === ""){
      document.getElementById("secretDiv").style.display = "block";
    } else {
      document.getElementById("secretDiv").style.display = "none";
    }

    if(data.winner){
      alert(data.winner + " wins!");
    }
  });
}

function submitSecret(){
  secret = document.getElementById("secret").value.toLowerCase();

  db.ref("rooms/"+roomCode).update({
    secret: secret,
    turn: "p2"
  });
}

function submitGuess(){
  let g = document.getElementById("guess").value.toLowerCase();

  db.ref("rooms/"+roomCode).once("value").then(snap=>{
    let data = snap.val();

    if(g === data.secret){
      db.ref("rooms/"+roomCode).update({
        winner: player
      });
    } else {
      let next = player === "p1" ? "p2" : "p1";
      db.ref("rooms/"+roomCode).update({
        turn: next
      });
    }
  });
}
</script>

</body>
</html>
